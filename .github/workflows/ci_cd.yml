name: IC CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [backend_initialisation]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 🟢 Setup Node.js (React frontend)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      # 📦 Install frontend dependencies
      - name: Install frontend deps
        run: |
          if [ -d "src/kt-gracie-frontend" ]; then
            cd src/kt-gracie-frontend
            npm install
          fi

      # 🏗️ Build frontend
      - name: Build frontend
        run: |
          if [ -d "src/kt-gracie-frontend" ]; then
            cd src/kt-gracie-frontend
            npm run build
          fi

      # 🧠 Install dfx (Motoko toolchain)
      - name: Install dfx
        run: |
          DFX_VERSION=0.31.0 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 📦 Install dfx cache (includes moc)
      - name: Install dfx cache
        run: dfx cache install
      
      # Downloading mops
      - name: Downloading mops
        run: curl -fsSL cli.mops.one/install.sh | sh

      # Install mops
      - name: Install mops
        run: mops install

      # 🚀 Start local replica
      - name: Start dfx replica
        run: dfx start --background

      # 🔨 Build canisters (Motoko backend)
      - name: Build canisters
        run: dfx build