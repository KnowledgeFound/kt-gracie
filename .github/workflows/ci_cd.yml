name: IC CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [backend_initialisation]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v6

      # 🟢 Setup Node.js (React frontend)
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # 🧠 Install dfx (Motoko toolchain)
      - name: Install dfx
        run: |
          export DFX_VERSION=0.31.0
          DFXVM_INIT_YES=true sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 🧠 Check dfx version (Motoko toolchain)
      - name: Check dfx version
        run: dfx --version
      
      # Downloading mops
      - name: Download mops
        run: curl -fsSL cli.mops.one/install.sh | sh

      # Installing mops
      - name: Install mops
        run: mops install

      # 🚀 Start local replica
      - name: Start dfx replica
        run: 
          dfx start --background
          sleep 5 # Wait for the replica to fully start

        
      # 🔨 Build canisters (Motoko backend)
      - name: Build canisters
        run: dfx build

      # 📦 Install frontend dependencies
      - name: Install frontend deps
        run: |
          if [ -d "src/kt-gracie-frontend" ]; then
            cd src/kt-gracie-frontend
            npm install
          fi

      # 🏗️ Build frontend
      - name: Build frontend
        run: |
          if [ -d "src/kt-gracie-frontend" ]; then
            cd src/kt-gracie-frontend
            npm run build
          fi
      
      # 🏗️ Run backend
      - name: Run backend
        run: dfx deploy kt-gracie-backend